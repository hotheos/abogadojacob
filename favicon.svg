<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente metálico dorado premium (Champán a Oro-Bronce) simple y elegante -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b45e"/>
      <stop offset="100%" stop-color="#9e732a"/>
    </linearGradient>

    <!-- Sombra premium de tono oro-marrón -->
    <filter id="emblem-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#5C4310" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo squircle dorado premium sin bordes -->
  <rect width="512" height="512" rx="135" fill="url(#gold-gradient)"/>

  <!-- Grupo con sombra integrada -->
  <g filter="url(#emblem-shadow)">
     <!-- 1. Barra de balanza horizontal, perfectamente recta -->
     <path d="M 110 122 H 402 V 136 H 110 Z" fill="#FFFFFF"/>

     <!-- 2. Hilos de soporte finos del platillo izquierdo -->
     <path d="M 110 129 L 50 245 M 110 129 L 170 245" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

     <!-- 3. Hilos de soporte finos del platillo derecho -->
     <path d="M 402 129 L 342 245 M 402 129 L 462 245" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

     <!-- 4. Platillo izquierdo cóncavo tridimensional (semi-elipse) -->
     <path d="M 50 245 C 50 274, 76 293, 110 293 C 144 293, 170 274, 170 245 Z" fill="#FFFFFF"/>

     <!-- 5. Platillo derecho cóncavo tridimensional (semi-elipse) -->
     <path d="M 342 245 C 342 274, 368 293, 402 293 C 436 293, 462 274, 462 245 Z" fill="#FFFFFF"/>

     <!-- 6. Monograma central en serif "J" de trazo variable y elegante -->
     <path d="M 238 136 H 274 V 315 C 274 365, 250 400, 206 400 C 175 400, 150 375, 150 345 C 150 338.4, 155.4 333, 162 333 C 168.6 333, 174 338.4, 174 345 C 174 362, 186 376, 206 376 C 228 376, 238 350, 238 315 Z" fill="#FFFFFF"/>
  </g>
</svg>